name: Deploy to SFTP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy public via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.SFTP_HOST }}
          port: ${{ secrets.SFTP_PORT }}
          username: ${{ secrets.SFTP_USERNAME }}
          ssh_private_key: ${{ secrets.SFTP_PRIVATE_KEY }}
          local_path: ./public
          remote_path: /var/www/amblyopialabs.com
          delete_remote_files_when_not_exist: true

      - name: Deploy server via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.SFTP_HOST }}
          port: ${{ secrets.SFTP_PORT }}
          username: ${{ secrets.SFTP_USERNAME }}
          ssh_private_key: ${{ secrets.SFTP_PRIVATE_KEY }}
          local_path: ./server
          remote_path: /var/www/amblyopialabs.com
          delete_remote_files_when_not_exist: true

      - name: Deploy nginx config via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.SFTP_HOST }}
          port: ${{ secrets.SFTP_PORT }}
          username: ${{ secrets.SFTP_USERNAME }}
          ssh_private_key: ${{ secrets.SFTP_PRIVATE_KEY }}
          local_path: ./nginx
          remote_path: /var/www/amblyopialabs.com
          delete_remote_files_when_not_exist: true

      - name: Reload nginx and restart app
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SFTP_HOST }}
          port: ${{ secrets.SFTP_PORT }}
          username: ${{ secrets.SFTP_USERNAME }}
          key: ${{ secrets.SFTP_PRIVATE_KEY }}
          script: |
            sudo cp /var/www/amblyopialabs.com/nginx/amblyopialabs.com.conf /etc/nginx/sites-available/amblyopialabs.com
            sudo ln -sf /etc/nginx/sites-available/amblyopialabs.com /etc/nginx/sites-enabled/amblyopialabs.com
            sudo nginx -t && sudo systemctl reload nginx
            pm2 restart amblyopialabs.com
