<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game 1</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        overflow: hidden;
      }
      body {
        background: #555;
        overflow: hidden;
      }
      canvas {
        display: block;
        position: fixed;
        top: 0;
        left: 0;
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>
    <script>
      // roundRect polyfill for iOS Safari < 15.4
      if (!CanvasRenderingContext2D.prototype.roundRect) {
        CanvasRenderingContext2D.prototype.roundRect = function (
          x,
          y,
          w,
          h,
          r,
        ) {
          r = typeof r === "number" ? r : Array.isArray(r) ? r[0] : 0;
          r = Math.min(r, w / 2, h / 2);
          this.moveTo(x + r, y);
          this.lineTo(x + w - r, y);
          this.arcTo(x + w, y, x + w, y + r, r);
          this.lineTo(x + w, y + h - r);
          this.arcTo(x + w, y + h, x + w - r, y + h, r);
          this.lineTo(x + r, y + h);
          this.arcTo(x, y + h, x, y + h - r, r);
          this.lineTo(x, y + r);
          this.arcTo(x, y, x + r, y, r);
          this.closePath();
        };
      }

      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");

      function resize() {
        const vv = window.visualViewport;
        canvas.width = vv ? Math.round(vv.width) : window.innerWidth;
        canvas.height = vv ? Math.round(vv.height) : window.innerHeight;
      }
      resize();
      window.addEventListener("resize", resize);
      if (window.visualViewport) {
        window.visualViewport.addEventListener("resize", resize);
      }

      const W = () => canvas.width;
      const H = () => canvas.height;

      const PADDLE_WIDTH = 104;
      const PADDLE_HEIGHT = 12;
      const BALL_RADIUS = 14;
      const CROSS_SECONDS = 2;

      const paddle = { x: 0, y: 0, vx: 0 };
      const mouse = { x: -100, y: -100 };
      const ball = { x: 0, y: 0, vx: 0, vy: 0 };

      let gameBg = "#000";
      const gameToken = localStorage.getItem("al_token");
      let sessionId = null;
      let userStats = null;
      let sessionMethod = null;
      let selectedMethod = localStorage.getItem("al_game_method") || null;

      function formatDuration(sec) {
        if (!sec) return "0m";
        if (sec < 3600) return `${Math.floor(sec / 60)}m`;
        return `${Math.floor(sec / 3600)}h ${Math.floor((sec % 3600) / 60)}m`;
      }

      async function startSession() {
        if (!gameToken) return;
        try {
          const res = await fetch("/api/sessions", {
            method: "POST",
            headers: { "Content-Type": "application/json", Authorization: `Bearer ${gameToken}` },
            body: JSON.stringify({ gameId: "game-1", method: sessionMethod }),
          });
          if (!res.ok) return;
          sessionId = (await res.json()).sessionId;
        } catch {}
      }

      async function endSession(finalScore, completed) {
        if (!sessionId) return;
        const id = sessionId;
        sessionId = null;
        try {
          await fetch(`/api/sessions/${id}`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json", Authorization: `Bearer ${gameToken}` },
            body: JSON.stringify({ score: finalScore, completed }),
          });
          fetchStats();
        } catch {}
      }

      async function fetchStats() {
        if (!gameToken) return;
        try {
          const res = await fetch("/api/sessions/stats?gameId=game-1", {
            headers: { Authorization: `Bearer ${gameToken}` },
          });
          if (res.ok) userStats = await res.json();
        } catch {}
      }

      (async () => {
        if (!gameToken) return;
        try {
          const [acctRes] = await Promise.all([
            fetch("/api/account", { headers: { Authorization: `Bearer ${gameToken}` } }),
            fetchStats(),
          ]);
          if (acctRes.ok) {
            const data = await acctRes.json();
            if (data.calibrationBg) {
              gameBg = data.calibrationBg;
              document.body.style.background = gameBg;
            }
          }
        } catch {}
      })();

      // 'intro' | 'playing' | 'gameover'
      let state = "intro";
      let showCursor = true;
      let score = 0;
      let lastTime = null;
      let opacity = 1;
      let bgR = 0, bgG = 0, bgB = 0;

      function parseBg(hex) {
        const h = hex.replace("#", "");
        const f = h.length === 3 ? h.split("").map(c => c + c).join("") : h;
        bgR = parseInt(f.slice(0, 2), 16);
        bgG = parseInt(f.slice(2, 4), 16);
        bgB = parseInt(f.slice(4, 6), 16);
      }

      // Cursor toggle button rect, set each draw frame
      const toggleBtn = { x: 0, y: 0, w: 220, h: 44 };

      function resetBall() {
        ball.x = W() / 2;
        ball.y = H() * 0.4;
        ball.vy = -(H() / CROSS_SECONDS);
        ball.vx = (W() / CROSS_SECONDS) * 0.4 * (Math.random() < 0.5 ? 1 : -1);
      }

      function selectMethod(method) {
        selectedMethod = method;
        localStorage.setItem("al_game_method", method);
      }

      function startGame() {
        if (!selectedMethod) return;
        sessionMethod = selectedMethod;
        state = "playing";
        score = 0;
        opacity = 1;
        parseBg(gameBg);
        paddle.x = W() / 2 - PADDLE_WIDTH / 2;
        paddle.y = H() - 64;
        paddle.vx = 0;
        mouse.x = W() / 2;
        mouse.y = H() / 2;
        resetBall();
        paused = false;
        if (!showCursor && !isTouchDevice()) canvas.requestPointerLock();
        startSession();
      }

      // Mouse control
      canvas.addEventListener("mousemove", (e) => {
        if (document.pointerLockElement === canvas) {
          mouse.x = Math.max(0, Math.min(W(), mouse.x + e.movementX));
          mouse.y = Math.max(0, Math.min(H(), mouse.y + e.movementY));
        } else {
          mouse.x = e.clientX;
          mouse.y = e.clientY;
        }
        if (state === "playing") paddle.x = mouse.x - PADDLE_WIDTH / 2;
      });

      // Touch control
      canvas.addEventListener(
        "touchstart",
        (e) => {
          e.preventDefault();
          const t = e.touches[0];
          mouse.x = t.clientX;
          mouse.y = t.clientY;
          if (state === "intro") {
            const tx = t.clientX, ty = t.clientY;
            const hit = (b) => tx >= b.x && tx <= b.x + b.w && ty >= b.y && ty <= b.y + b.h;
            if (hit(introGamesLink)) {
              window.location.href = "/games/";
            } else if (hit(patchBtn)) {
              selectMethod("patching");
            } else if (hit(glassesBtn)) {
              selectMethod("glasses");
            } else if (hit(startBtn)) {
              startGame();
            }
          } else if (state === "playing") {
            paddle.x = t.clientX - PADDLE_WIDTH / 2;
          } else if (state === "gameover") {
            const x = t.clientX,
              y = t.clientY;
            if (
              x >= homeBtn.x &&
              x <= homeBtn.x + homeBtn.w &&
              y >= homeBtn.y &&
              y <= homeBtn.y + homeBtn.h
            ) {
              window.location.href = "/games/";
            } else if (
              x >= calibBtn.x &&
              x <= calibBtn.x + calibBtn.w &&
              y >= calibBtn.y &&
              y <= calibBtn.y + calibBtn.h
            ) {
              window.location.href = "/calibration/";
            } else {
              state = "intro";
            }
          }
        },
        { passive: false },
      );

      canvas.addEventListener(
        "touchmove",
        (e) => {
          e.preventDefault();
          const t = e.touches[0];
          mouse.x = t.clientX;
          mouse.y = t.clientY;
          if (state === "playing") paddle.x = t.clientX - PADDLE_WIDTH / 2;
        },
        { passive: false },
      );

      // Keyboard control
      const keys = new Set();
      const ARROW_KEYS = new Set([
        "ArrowLeft",
        "ArrowRight",
        "ArrowUp",
        "ArrowDown",
      ]);
      window.addEventListener("keydown", (e) => {
        keys.add(e.key);
        if (ARROW_KEYS.has(e.key)) e.preventDefault();
        if (state === "gameover") state = "intro";
      });
      window.addEventListener("keyup", (e) => keys.delete(e.key));

      const PADDLE_MAX_SPEED = () => W();
      const PADDLE_ACCEL = () => W() * 4;

      const isTouchDevice = () => navigator.maxTouchPoints > 0;

      const DASH_ON = [10, 14];
      const DASH_OFF = [];

      let paused = false;
      let lastTouchEnd = 0;
      canvas.addEventListener("touchend", () => {
        lastTouchEnd = Date.now();
      });

      canvas.addEventListener("click", (e) => {
        if (Date.now() - lastTouchEnd < 500) return;
        if (state === "playing") {
          paused = !paused;
          return;
        }
        if (state === "intro") {
          const cx = e.clientX, cy = e.clientY;
          const hit = (b) => cx >= b.x && cx <= b.x + b.w && cy >= b.y && cy <= b.y + b.h;
          if (hit(introGamesLink)) {
            window.location.href = "/games/";
          } else if (hit(patchBtn)) {
            selectMethod("patching");
          } else if (hit(glassesBtn)) {
            selectMethod("glasses");
          } else if (hit(startBtn)) {
            startGame();
          } else if (hit(toggleBtn)) {
            showCursor = !showCursor;
          }
        } else if (state === "gameover") {
          if (
            e.clientX >= homeBtn.x &&
            e.clientX <= homeBtn.x + homeBtn.w &&
            e.clientY >= homeBtn.y &&
            e.clientY <= homeBtn.y + homeBtn.h
          ) {
            window.location.href = "/games/";
          } else if (
            e.clientX >= calibBtn.x &&
            e.clientX <= calibBtn.x + calibBtn.w &&
            e.clientY >= calibBtn.y &&
            e.clientY <= calibBtn.y + calibBtn.h
          ) {
            window.location.href = "/calibration/";
          } else {
            state = "intro";
          }
        }
      });

      function update(dt) {
        if (state !== "playing" || paused) return;

        const maxSpeed = PADDLE_MAX_SPEED();
        const accel = PADDLE_ACCEL();
        if (keys.has("ArrowLeft") || keys.has("a") || keys.has("A")) {
          paddle.vx = Math.max(-maxSpeed, paddle.vx - accel * dt);
        } else if (keys.has("ArrowRight") || keys.has("d") || keys.has("D")) {
          paddle.vx = Math.min(maxSpeed, paddle.vx + accel * dt);
        } else {
          paddle.vx = 0;
        }
        paddle.x += paddle.vx * dt;
        paddle.x = Math.max(0, Math.min(W() - PADDLE_WIDTH, paddle.x));

        const prevX = ball.x;
        const prevY = ball.y;
        ball.x += ball.vx * dt;
        ball.y += ball.vy * dt;

        if (ball.y - BALL_RADIUS < 0) {
          ball.y = BALL_RADIUS;
          ball.vy = Math.abs(ball.vy);
        }
        if (ball.x - BALL_RADIUS < 0) {
          ball.x = BALL_RADIUS;
          ball.vx = Math.abs(ball.vx);
        }
        if (ball.x + BALL_RADIUS > W()) {
          ball.x = W() - BALL_RADIUS;
          ball.vx = -Math.abs(ball.vx);
        }

        const paddleTop = paddle.y;
        const crossedEdge =
          ball.vy > 0 &&
          prevY + BALL_RADIUS < paddleTop &&
          ball.y + BALL_RADIUS >= paddleTop;
        if (crossedEdge) {
          const t =
            (paddleTop - (prevY + BALL_RADIUS)) /
            (ball.y + BALL_RADIUS - (prevY + BALL_RADIUS));
          const crossX = prevX + t * (ball.x - prevX);
          if (
            crossX + BALL_RADIUS >= paddle.x &&
            crossX - BALL_RADIUS <= paddle.x + PADDLE_WIDTH
          ) {
            ball.y = paddleTop - BALL_RADIUS;
            ball.vy = -Math.abs(ball.vy);
            const hitPos = (ball.x - paddle.x) / PADDLE_WIDTH;
            ball.vx = (hitPos - 0.5) * 2 * (W() / CROSS_SECONDS) * 0.6;
            opacity = Math.max(0, opacity - 0.01);
            score++;
          }
        }

        if (ball.y - BALL_RADIUS > H()) {
          state = "gameover";
          if (document.exitPointerLock) document.exitPointerLock();
          endSession(score, true);
        }
      }

      function drawGame() {
        // Center dashed line
        ctx.setLineDash(DASH_ON);
        ctx.strokeStyle = "#333";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(0, H() / 2);
        ctx.lineTo(W(), H() / 2);
        ctx.stroke();
        ctx.setLineDash(DASH_OFF);

        // Paddle
        ctx.fillStyle = `rgb(${Math.round(22 * opacity)},${Math.round(123 * opacity)},${Math.round(123 * opacity)})`;
        ctx.beginPath();
        ctx.roundRect(paddle.x, paddle.y, PADDLE_WIDTH, PADDLE_HEIGHT, 4);
        ctx.fill();

        // Ball
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, BALL_RADIUS, 0, Math.PI * 2);
        ctx.fillStyle = `rgb(${Math.round(193 * opacity)},${Math.round(32 * opacity)},${Math.round(32 * opacity)})`;
        ctx.fill();

        // Mouse pointer dot
        if (!isTouchDevice()) {
          ctx.beginPath();
          ctx.arc(mouse.x, mouse.y, 4, 0, Math.PI * 2);
          ctx.fillStyle = "#aaa";
          ctx.fill();
        }

        // Score
        ctx.fillStyle = "rgba(255,255,255,0.4)";
        ctx.font = "bold 48px monospace";
        ctx.textAlign = "center";
        ctx.fillText(score, W() / 2, 64);

        if (paused) {
          ctx.fillStyle = "rgba(0,0,0,0.45)";
          ctx.fillRect(0, 0, W(), H());
          ctx.fillStyle = "#fff";
          ctx.font = "bold 40px sans-serif";
          ctx.textAlign = "center";
          ctx.fillText("Paused", W() / 2, H() / 2);
          ctx.font = "18px sans-serif";
          ctx.fillStyle = "rgba(255,255,255,0.6)";
          ctx.fillText("Click to continue", W() / 2, H() / 2 + 40);
        }
      }

      function drawMethodBtn(btn, label, iconFn, selected) {
        ctx.fillStyle = selected ? "rgba(255,255,255,0.11)" : "rgba(255,255,255,0.07)";
        ctx.beginPath();
        ctx.roundRect(btn.x, btn.y, btn.w, btn.h, 10);
        ctx.fill();
        ctx.strokeStyle = selected ? "rgba(255,255,255,0.85)" : "rgba(255,255,255,0.18)";
        ctx.lineWidth = selected ? 2.5 : 1;
        ctx.stroke();
        iconFn(btn.x + btn.w / 2, btn.y + 46);
        ctx.fillStyle = "rgba(255,255,255,0.65)";
        ctx.font = "13px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(label, btn.x + btn.w / 2, btn.y + btn.h - 12);
      }

      function drawPatchIcon(cx, cy) {
        // Eye outline (faint, behind the patch)
        ctx.strokeStyle = "rgba(255,255,255,0.2)";
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.ellipse(cx, cy, 22, 14, 0, 0, Math.PI * 2);
        ctx.stroke();
        // Patch body
        ctx.fillStyle = "rgba(190,150,90,0.9)";
        ctx.beginPath();
        ctx.roundRect(cx - 26, cy - 18, 52, 36, 6);
        ctx.fill();
        ctx.strokeStyle = "rgba(210,170,100,0.8)";
        ctx.lineWidth = 1.5;
        ctx.stroke();
        // Strap lines
        ctx.strokeStyle = "rgba(210,170,100,0.55)";
        ctx.lineWidth = 2;
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(cx - 26, cy - 4);
        ctx.lineTo(cx - 40, cy - 12);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(cx + 26, cy - 4);
        ctx.lineTo(cx + 40, cy - 12);
        ctx.stroke();
        ctx.lineCap = "butt";
      }

      function drawGlassesIcon(cx, cy) {
        const lRx = 19, lRy = 13, bridge = 8;
        const lx = cx - lRx - bridge / 2;
        const rx = cx + lRx + bridge / 2;
        // Temple arms
        ctx.strokeStyle = "rgba(255,255,255,0.45)";
        ctx.lineWidth = 2;
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(lx - lRx, cy);
        ctx.lineTo(lx - lRx - 14, cy);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(rx + lRx, cy);
        ctx.lineTo(rx + lRx + 14, cy);
        ctx.stroke();
        // Left lens — red
        ctx.fillStyle = "rgba(220,55,55,0.25)";
        ctx.beginPath();
        ctx.ellipse(lx, cy, lRx, lRy, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "#d44";
        ctx.lineWidth = 2;
        ctx.stroke();
        // Right lens — cyan
        ctx.fillStyle = "rgba(30,160,160,0.25)";
        ctx.beginPath();
        ctx.ellipse(rx, cy, lRx, lRy, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "#4bb";
        ctx.lineWidth = 2;
        ctx.stroke();
        // Bridge
        ctx.strokeStyle = "rgba(255,255,255,0.55)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(lx + lRx, cy);
        ctx.lineTo(rx - lRx, cy);
        ctx.stroke();
        ctx.lineCap = "butt";
      }

      function drawIntro() {
        ctx.fillStyle = "#fff";
        ctx.font = "bold 56px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("Game 1", W() / 2, H() / 2 - 100);

        ctx.font = "20px sans-serif";
        ctx.fillStyle = "rgba(255,255,255,0.5)";
        ctx.fillText(
          isTouchDevice()
            ? "Drag to move the paddle"
            : "Use mouse or arrow keys to move the paddle",
          W() / 2,
          H() / 2 - 54,
        );

        if (!isTouchDevice()) {
          // Toggle switch row: [switch]  [label]
          const label = "Show mouse pointer";
          ctx.font = "18px sans-serif";
          const labelW = ctx.measureText(label).width;
          const switchW = 52;
          const switchH = 28;
          const gap = 14;
          const rowW = switchW + gap + labelW;
          const rowX = W() / 2 - rowW / 2;
          const rowY = H() / 2;

          // Store clickable area covering the full row
          toggleBtn.x = rowX;
          toggleBtn.y = rowY - switchH / 2;
          toggleBtn.w = rowW;
          toggleBtn.h = switchH;

          // Switch track
          const trackX = rowX;
          const trackY = rowY - switchH / 2;
          const radius = switchH / 2;
          ctx.fillStyle = showCursor ? "#007a8a" : "#666";
          ctx.beginPath();
          ctx.roundRect(trackX, trackY, switchW, switchH, radius);
          ctx.fill();
          if (!showCursor) {
            ctx.strokeStyle = "#999";
            ctx.lineWidth = 1.5;
            ctx.stroke();
          }

          // Switch knob
          const knobR = radius - 3;
          const knobX = showCursor
            ? trackX + radius
            : trackX + switchW - radius;
          ctx.fillStyle = showCursor ? "#fff" : "#ddd";
          ctx.beginPath();
          ctx.arc(knobX, rowY, knobR, 0, Math.PI * 2);
          ctx.fill();

          // Label
          ctx.fillStyle = "#e8eaf0";
          ctx.textAlign = "left";
          ctx.fillText(label, rowX + switchW + gap, rowY + 6);
        }

        ctx.fillStyle = "rgba(255,255,255,0.38)";
        ctx.font = "15px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("Select how you're training:", W() / 2, H() / 2 + 54);

        const btnGapM = 16;
        const totalMW = patchBtn.w + btnGapM + glassesBtn.w;
        const mBtnY = H() / 2 + 68;
        patchBtn.x   = W() / 2 - totalMW / 2;
        patchBtn.y   = mBtnY;
        glassesBtn.x = patchBtn.x + patchBtn.w + btnGapM;
        glassesBtn.y = mBtnY;
        drawMethodBtn(patchBtn,   "Eye Patching", drawPatchIcon,   selectedMethod === "patching");
        drawMethodBtn(glassesBtn, "3D Glasses",   drawGlassesIcon, selectedMethod === "glasses");

        // Start Game button
        const ready = selectedMethod !== null;
        startBtn.x = W() / 2 - startBtn.w / 2;
        startBtn.y = mBtnY + patchBtn.h + 18;
        ctx.fillStyle = ready ? "rgba(255,255,255,0.92)" : "rgba(255,255,255,0.15)";
        ctx.beginPath();
        ctx.roundRect(startBtn.x, startBtn.y, startBtn.w, startBtn.h, 8);
        ctx.fill();
        ctx.fillStyle = ready ? "#111" : "rgba(255,255,255,0.3)";
        ctx.font = "bold 15px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("Start Game", W() / 2, startBtn.y + 28);

        if (userStats && userStats.totalSessions > 0) {
          const parts = [];
          if (userStats.bestScore !== null) parts.push(`Best: ${userStats.bestScore}`);
          if (userStats.avgScore !== null) parts.push(`Avg: ${userStats.avgScore}`);
          parts.push(`Sessions: ${userStats.totalSessions}`);
          parts.push(`Time: ${formatDuration(userStats.totalDurationSec)}`);
          ctx.fillStyle = "rgba(255,255,255,0.25)";
          ctx.font = "14px sans-serif";
          ctx.textAlign = "center";
          ctx.fillText(parts.join("  ·  "), W() / 2, startBtn.y + startBtn.h + 26);
        }

        const linkLabel = "← Back to games";
        ctx.font = "14px sans-serif";
        const linkW = ctx.measureText(linkLabel).width;
        const linkX = W() / 2 - linkW / 2;
        const linkY = H() - 36;
        introGamesLink.x = linkX - 8;
        introGamesLink.y = linkY - 18;
        introGamesLink.w = linkW + 16;
        introGamesLink.h = 28;
        ctx.fillStyle = "rgba(255,255,255,0.22)";
        ctx.fillText(linkLabel, W() / 2, linkY);
      }

      const homeBtn = { x: 0, y: 0, w: 180, h: 40 };
      const calibBtn = { x: 0, y: 0, w: 180, h: 40 };
      const introGamesLink = { x: 0, y: 0, w: 0, h: 0 };
      const patchBtn   = { x: 0, y: 0, w: 155, h: 100 };
      const glassesBtn = { x: 0, y: 0, w: 155, h: 100 };
      const startBtn   = { x: 0, y: 0, w: 160, h: 44 };

      function drawGameOver() {
        ctx.fillStyle = "rgba(0,0,0,0.65)";
        ctx.fillRect(0, 0, W(), H());

        ctx.fillStyle = "#fff";
        ctx.font = "bold 56px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("Game Over", W() / 2, H() / 2 - 30);

        ctx.font = "28px sans-serif";
        ctx.fillStyle = "rgba(255,255,255,0.7)";
        ctx.fillText(`Score: ${score}`, W() / 2, H() / 2 + 20);

        if (userStats) {
          const isNewBest = userStats.bestScore === null || score > userStats.bestScore;
          if (isNewBest && score > 0) {
            ctx.font = "bold 16px sans-serif";
            ctx.fillStyle = "#4ade80";
            ctx.fillText("New best!", W() / 2, H() / 2 + 50);
          } else if (userStats.bestScore !== null) {
            ctx.font = "16px sans-serif";
            ctx.fillStyle = "rgba(255,255,255,0.35)";
            const parts = [`Best: ${userStats.bestScore}`];
            if (userStats.avgScore !== null) parts.push(`Avg: ${userStats.avgScore}`);
            parts.push(`Sessions: ${userStats.totalSessions}`);
            ctx.fillText(parts.join("  ·  "), W() / 2, H() / 2 + 50);
          }
        }

        ctx.font = "20px sans-serif";
        ctx.fillStyle = "rgba(255,255,255,0.5)";
        ctx.fillText(
          isTouchDevice()
            ? "Tap to continue"
            : "Click or press any key to continue",
          W() / 2,
          H() / 2 + 76,
        );

        // Buttons row
        const btnGap = 12;
        const totalW = homeBtn.w + btnGap + calibBtn.w;
        const btnY = H() / 2 + 116;
        homeBtn.x = W() / 2 - totalW / 2;
        homeBtn.y = btnY;
        calibBtn.x = homeBtn.x + homeBtn.w + btnGap;
        calibBtn.y = btnY;

        function drawBtn(btn, label) {
          ctx.fillStyle = "#334";
          ctx.beginPath();
          ctx.roundRect(btn.x, btn.y, btn.w, btn.h, 6);
          ctx.fill();
          ctx.strokeStyle = "#778";
          ctx.lineWidth = 1;
          ctx.stroke();
          ctx.fillStyle = "#ccd";
          ctx.font = "14px sans-serif";
          ctx.textAlign = "center";
          ctx.fillText(label, btn.x + btn.w / 2, btn.y + 26);
        }

        drawBtn(homeBtn, "← Games");
        drawBtn(calibBtn, "Color Calibration");
      }

      function draw() {
        document.body.style.cursor = state === "playing" ? "none" : "default";

        if (state === "playing" || state === "gameover") {
          const t = Math.min(score, 100) / 100;
          ctx.fillStyle = `rgb(${Math.round(bgR * (1 - t))},${Math.round(bgG * (1 - t))},${Math.round(bgB * (1 - t))})`;
        } else {
          ctx.fillStyle = gameBg;
        }
        ctx.fillRect(0, 0, W(), H());

        if (state === "intro") {
          drawIntro();
        } else if (state === "playing") {
          drawGame();
        } else if (state === "gameover") {
          drawGame();
          drawGameOver();
        }
      }

      function loop(timestamp) {
        if (lastTime === null) lastTime = timestamp;
        const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
        lastTime = timestamp;

        update(dt);
        draw();
        requestAnimationFrame(loop);
      }

      requestAnimationFrame(loop);
    </script>
  </body>
</html>
