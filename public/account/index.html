<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Account — AmblyopiaLabs</title>
    <link rel="stylesheet" href="/shared/styles.css" />
    <script src="/shared/layout.js" defer></script>
  </head>
  <body>
    <main class="account-main">
      <h1 class="account-heading">My Account</h1>

      <div id="loading" class="page-state">Loading…</div>
      <div id="error-msg" class="page-state" style="display:none"></div>

      <div id="account-content" style="display:none">

        <div class="profile-notice" id="profile-prompt" style="display:none">
          <span class="profile-notice-icon">&#9432;</span>
          <span>Complete your profile so clinicians and research staff can identify you.</span>
        </div>

        <div class="info-card">
          <div class="info-card-header">
            <span>Profile</span>
            <button class="info-card-edit" id="edit-btn" onclick="enterEditMode()" style="display:none" title="Edit profile">&#9998;</button>
          </div>

          <!-- View mode -->
          <div id="profile-view" style="display:none">
            <div class="data-row">
              <span class="data-row-label">First name</span>
              <span class="data-row-value" id="v-first"></span>
            </div>
            <div class="data-row">
              <span class="data-row-label">Last name</span>
              <span class="data-row-value" id="v-last"></span>
            </div>
            <div class="data-row" id="v-dob-field" style="display:none">
              <span class="data-row-label">Date of birth</span>
              <span class="data-row-value" id="v-dob"></span>
            </div>
            <div class="data-row">
              <span class="data-row-label">Email</span>
              <span class="data-row-value" id="v-email"></span>
            </div>
            <div class="data-row">
              <span class="data-row-label">Role</span>
              <span class="data-row-value" id="v-role"></span>
            </div>
          </div>

          <!-- Edit mode -->
          <div class="edit-form" id="profile-edit" style="display:none">
            <div class="edit-form-row">
              <div class="edit-field">
                <label class="edit-field-label" for="edit-first">First name</label>
                <input class="edit-field-input" type="text" id="edit-first" placeholder="Jane" autocomplete="given-name" />
              </div>
              <div class="edit-field">
                <label class="edit-field-label" for="edit-last">Last name</label>
                <input class="edit-field-input" type="text" id="edit-last" placeholder="Smith" autocomplete="family-name" />
              </div>
            </div>
            <div class="edit-form-row" id="dob-row" style="display:none">
              <div class="edit-field">
                <label class="edit-field-label" for="edit-dob">Date of birth</label>
                <input class="edit-field-input" type="date" id="edit-dob" autocomplete="bday" />
              </div>
            </div>
            <div class="edit-form-row">
              <div class="edit-field">
                <label class="edit-field-label" for="edit-email">Email</label>
                <input class="edit-field-input" type="email" id="edit-email" placeholder="you@example.com" autocomplete="email" />
              </div>
            </div>
            <div class="edit-actions">
              <button class="btn-save" id="save-btn" onclick="saveProfile()">Save</button>
              <button class="btn-cancel" id="cancel-btn" onclick="exitEditMode()" style="display:none">Cancel</button>
              <span class="form-status" id="edit-status"></span>
            </div>
          </div>

          <!-- Email verification step -->
          <div class="email-verify" id="email-verify" style="display:none">
            <p class="email-verify-note">We sent a 6-digit code to <strong id="pending-email-label"></strong>. Enter it below to confirm the change.</p>
            <div class="otp-group" id="ev-otp-group">
              <input class="otp-digit" id="ev0" inputmode="numeric" />
              <input class="otp-digit" id="ev1" inputmode="numeric" />
              <input class="otp-digit" id="ev2" inputmode="numeric" />
              <input class="otp-digit" id="ev3" inputmode="numeric" />
              <input class="otp-digit" id="ev4" inputmode="numeric" />
              <input class="otp-digit" id="ev5" inputmode="numeric" />
            </div>
            <div class="edit-actions">
              <button class="btn-save" id="ev-verify-btn" onclick="verifyEmailChange()">Verify</button>
              <button class="btn-cancel" onclick="cancelEmailChange()">Cancel</button>
              <span class="form-status" id="ev-status"></span>
            </div>
          </div>
        </div>

        <div class="info-card" id="clinic-card" style="display:none">
          <div class="info-card-header"><span>Clinic</span></div>
          <div class="data-row">
            <span class="data-row-label">Clinic code</span>
            <span class="data-row-value clinic-code" id="f-clinic-code"></span>
          </div>
        </div>

        <div class="info-card">
          <div class="info-card-header"><span>Activity</span></div>
          <div class="data-row">
            <span class="data-row-label">Member since</span>
            <span class="data-row-value" id="f-created"></span>
          </div>
          <div class="data-row">
            <span class="data-row-label">Last sign-in</span>
            <span class="data-row-value" id="f-last-login"></span>
          </div>
        </div>

      </div>
    </main>

    <script>
      let token = localStorage.getItem('al_token');
      if (!token) {
        window.location.href = '/auth/?mode=signin&returnTo=' + encodeURIComponent(location.href);
      }

      let currentUser = null;
      let pendingNewEmail = null;

      // ── OTP digit inputs for email verification ──────────────────────────
      const evDigits = Array.from({ length: 6 }, (_, i) => document.getElementById(`ev${i}`));

      evDigits.forEach((input, i) => {
        input.addEventListener('keydown', e => {
          if (e.key === 'Backspace') {
            if (input.value) { input.value = ''; } else if (i > 0) { evDigits[i - 1].focus(); evDigits[i - 1].value = ''; }
            updateEvBtn(); e.preventDefault(); return;
          }
          if (e.key === 'ArrowLeft' && i > 0) { evDigits[i - 1].focus(); e.preventDefault(); }
          if (e.key === 'ArrowRight' && i < 5) { evDigits[i + 1].focus(); e.preventDefault(); }
          if (e.key === 'Enter') verifyEmailChange();
        });
        input.addEventListener('input', () => {
          input.value = input.value.replace(/\D/g, '').slice(-1);
          if (input.value && i < 5) evDigits[i + 1].focus();
          updateEvBtn();
        });
        input.addEventListener('paste', e => {
          e.preventDefault();
          const text = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '');
          text.slice(0, 6).split('').forEach((ch, idx) => { if (evDigits[idx]) evDigits[idx].value = ch; });
          evDigits[Math.min(text.length, 5)].focus();
          updateEvBtn();
        });
      });

      function getEvCode() { return evDigits.map(d => d.value).join(''); }
      function updateEvBtn() { document.getElementById('ev-verify-btn').disabled = getEvCode().length !== 6; }

      // ── Helpers ──────────────────────────────────────────────────────────
      function fmtDate(iso) {
        if (!iso) return '—';
        return new Date(iso).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
      }

      function fmtDOB(ymd) {
        if (!ymd) return '—';
        const [y, m, d] = ymd.split('-').map(Number);
        return new Date(y, m - 1, d).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
      }

      function isComplete(u) {
        return !!(u.firstName && u.lastName && (u.role !== 'patient' || u.dateOfBirth));
      }

      function setEditStatus(msg, isError) {
        const el = document.getElementById('edit-status');
        el.textContent = msg;
        el.className = 'form-status' + (isError ? ' is-error' : '');
      }

      function setEvStatus(msg, isError) {
        const el = document.getElementById('ev-status');
        el.textContent = msg;
        el.className = 'form-status' + (isError ? ' is-error' : '');
      }

      function populateView(u) {
        document.getElementById('v-first').textContent = u.firstName || '';
        document.getElementById('v-last').textContent = u.lastName || '';
        document.getElementById('v-email').textContent = u.email;
        document.getElementById('v-role').innerHTML = `<span class="role-badge">${u.role}</span>`;
        if (u.role === 'patient') {
          document.getElementById('v-dob').textContent = fmtDOB(u.dateOfBirth);
          document.getElementById('v-dob-field').style.display = '';
        }
      }

      // ── State transitions ────────────────────────────────────────────────
      function showViewMode() {
        document.getElementById('profile-view').style.display = '';
        document.getElementById('profile-edit').style.display = 'none';
        document.getElementById('email-verify').style.display = 'none';
        document.getElementById('edit-btn').style.display = '';
        document.getElementById('cancel-btn').style.display = 'none';
      }

      function enterEditMode() {
        document.getElementById('profile-view').style.display = 'none';
        document.getElementById('profile-edit').style.display = '';
        document.getElementById('email-verify').style.display = 'none';
        document.getElementById('edit-btn').style.display = 'none';
        document.getElementById('cancel-btn').style.display = '';
        setEditStatus('');
      }

      function exitEditMode() {
        document.getElementById('edit-first').value = currentUser.firstName || '';
        document.getElementById('edit-last').value = currentUser.lastName || '';
        document.getElementById('edit-dob').value = currentUser.dateOfBirth || '';
        document.getElementById('edit-email').value = currentUser.email;
        showViewMode();
      }

      function showEmailVerify(newEmail) {
        pendingNewEmail = newEmail;
        document.getElementById('pending-email-label').textContent = newEmail;
        evDigits.forEach(d => d.value = '');
        updateEvBtn();
        document.getElementById('profile-edit').style.display = 'none';
        document.getElementById('email-verify').style.display = '';
        setEvStatus('');
        evDigits[0].focus();
      }

      function cancelEmailChange() {
        pendingNewEmail = null;
        if (isComplete(currentUser)) {
          showViewMode();
        } else {
          document.getElementById('email-verify').style.display = 'none';
          document.getElementById('profile-edit').style.display = '';
        }
      }

      // ── Load ─────────────────────────────────────────────────────────────
      (async function load() {
        try {
          const res = await fetch('/api/account', { headers: { Authorization: 'Bearer ' + token } });

          if (res.status === 401) {
            localStorage.removeItem('al_token');
            localStorage.removeItem('al_user');
            window.location.href = '/auth/?mode=signin&returnTo=' + encodeURIComponent(location.href);
            return;
          }
          if (!res.ok) throw new Error((await res.json()).error || 'Failed to load account.');

          const u = await res.json();
          currentUser = u;

          document.getElementById('edit-first').value = u.firstName || '';
          document.getElementById('edit-last').value = u.lastName || '';
          document.getElementById('edit-email').value = u.email;

          if (u.role === 'patient') {
            document.getElementById('edit-dob').value = u.dateOfBirth || '';
            document.getElementById('dob-row').style.display = '';
          }

          document.getElementById('f-created').textContent = fmtDate(u.createdAt);
          document.getElementById('f-last-login').textContent = fmtDate(u.lastLogin);

          if (u.clinicCode) {
            document.getElementById('f-clinic-code').textContent = u.clinicCode;
            document.getElementById('clinic-card').style.display = '';
          }

          const stored = localStorage.getItem('al_user');
          if (stored) {
            const parsed = JSON.parse(stored);
            parsed.firstName = u.firstName;
            parsed.lastName = u.lastName;
            localStorage.setItem('al_user', JSON.stringify(parsed));
          }

          if (isComplete(u)) {
            populateView(u);
            showViewMode();
          } else {
            document.getElementById('profile-prompt').style.display = '';
            document.getElementById('profile-edit').style.display = '';
          }

          document.getElementById('loading').style.display = 'none';
          document.getElementById('account-content').style.display = '';
        } catch (err) {
          document.getElementById('loading').style.display = 'none';
          const el = document.getElementById('error-msg');
          el.textContent = err.message;
          el.style.display = '';
        }
      })();

      // ── Save profile (name / DOB / email) ────────────────────────────────
      async function saveProfile() {
        const firstName   = document.getElementById('edit-first').value.trim();
        const lastName    = document.getElementById('edit-last').value.trim();
        const dobVisible  = document.getElementById('dob-row').style.display !== 'none';
        const dateOfBirth = dobVisible ? (document.getElementById('edit-dob').value || undefined) : undefined;
        const newEmail    = document.getElementById('edit-email').value.trim().toLowerCase();
        const emailChanged = newEmail !== currentUser.email;

        const btn = document.getElementById('save-btn');
        btn.disabled = true;
        btn.textContent = 'Saving…';
        setEditStatus('');

        try {
          const patch = {};
          if (firstName  !== (currentUser.firstName  || '')) patch.firstName = firstName;
          if (lastName   !== (currentUser.lastName   || '')) patch.lastName  = lastName;
          if (dateOfBirth !== undefined && dateOfBirth !== (currentUser.dateOfBirth || '')) patch.dateOfBirth = dateOfBirth;

          if (Object.keys(patch).length) {
            const r = await fetch('/api/account', {
              method: 'PATCH',
              headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
              body: JSON.stringify(patch),
            });
            const d = await r.json();
            if (!r.ok) throw new Error(d.error || 'Failed to save.');

            currentUser.firstName   = d.firstName;
            currentUser.lastName    = d.lastName;
            currentUser.dateOfBirth = d.dateOfBirth;

            const stored = localStorage.getItem('al_user');
            if (stored) {
              const parsed = JSON.parse(stored);
              parsed.firstName = d.firstName;
              parsed.lastName  = d.lastName;
              localStorage.setItem('al_user', JSON.stringify(parsed));
            }
          }

          if (emailChanged) {
            const r = await fetch('/api/account/email/request', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
              body: JSON.stringify({ newEmail }),
            });
            const d = await r.json();
            if (!r.ok) throw new Error(d.error || 'Failed to send verification code.');
            showEmailVerify(newEmail);
          } else {
            document.getElementById('profile-prompt').style.display =
              isComplete(currentUser) ? 'none' : '';
            if (isComplete(currentUser)) {
              populateView(currentUser);
              showViewMode();
            } else {
              setEditStatus('Saved.');
              btn.disabled = false;
              btn.textContent = 'Save';
            }
          }
        } catch (err) {
          setEditStatus(err.message, true);
          btn.disabled = false;
          btn.textContent = 'Save';
        }
      }

      // ── Verify email change ───────────────────────────────────────────────
      async function verifyEmailChange() {
        const code = getEvCode();
        if (code.length !== 6) return;

        const btn = document.getElementById('ev-verify-btn');
        btn.disabled = true;
        btn.textContent = 'Verifying…';
        setEvStatus('');

        try {
          const res = await fetch('/api/account/email/verify', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
            body: JSON.stringify({ code }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Verification failed.');

          currentUser.email = pendingNewEmail;
          pendingNewEmail = null;

          const stored = localStorage.getItem('al_user');
          if (stored) {
            const parsed = JSON.parse(stored);
            parsed.email = currentUser.email;
            localStorage.setItem('al_user', JSON.stringify(parsed));
          }

          populateView(currentUser);
          showViewMode();
        } catch (err) {
          setEvStatus(err.message, true);
          btn.disabled = false;
          btn.textContent = 'Verify';
          updateEvBtn();
        }
      }
    </script>
  </body>
</html>
